run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - bodyclose
    - rowserrcheck
    - sqlclosecheck
    - prealloc
    - nilerr
    - errorlint

linters-settings:
  goimports:
    local-prefixes: github.com/yourusername/binance-oi-square-trader

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
