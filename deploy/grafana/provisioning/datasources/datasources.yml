apiVersion: 1

# Round 9 follow-up: delete then re-create to add explicit uid (Grafana 12.x
# refuses to mutate existing datasource uid in-place).
deleteDatasources:
  - name: Prometheus
    orgId: 1
  - name: Loki
    orgId: 1
  - name: PostgreSQL
    orgId: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false

  - name: PostgreSQL
    uid: postgres
    type: postgres
    access: proxy
    url: postgres:5432
    database: trader
    user: trader
    secureJsonData:
      password: trader
    jsonData:
      sslmode: disable
      postgresVersion: 1600
    editable: false
