global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'trader'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 开发期: trader 跑在 host 上, 通过 host.docker.internal 访问
  # 生产期: 同时存在 trader 容器(走容器名), 一份 job 两条 target 都 scrape
  - job_name: 'trader-host'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          service: 'trader'
          source: 'host'

  - job_name: 'trader-container'
    metrics_path: /metrics
    static_configs:
      - targets: ['trader:8080']
        labels:
          service: 'trader'
          source: 'container'
