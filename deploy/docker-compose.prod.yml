# =============================================================================
# 生产部署 — 与 docker-compose.yml 叠加使用
# Usage:
#   docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.prod.yml up -d
# =============================================================================

services:
  trader:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: trader-app
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      TZ: Asia/Shanghai
      # 容器内连接基础设施用容器名
      DATABASE_URL: postgres://trader:trader@postgres:5432/trader?sslmode=disable
      REDIS_URL: redis://redis:6379/0
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:2112:2112"
    volumes:
      - ./proxies.txt:/app/deploy/proxies.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # 同时校验 :8080 (dashboard /health) + :2112 (Phase 1.8 prometheus metrics)
      # 任一端口不响应即 unhealthy → docker compose ps 立即显示 + Caddy 不路由
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/health && curl -fs -o /dev/null http://localhost:2112/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  admin-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.admin-api
    container_name: trader-admin-api
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      TZ: Asia/Shanghai
      DATABASE_URL: postgres://trader:trader@postgres:5432/trader?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      PROMETHEUS_URL: http://trader-prometheus:9090
    ports:
      - "127.0.0.1:3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:3002/api/admin/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: trader-caddy
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      TZ: Asia/Shanghai
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy:/data
      - ./data/caddy-config:/config
      - ./admin-web-dist:/srv/admin:ro   # admin-web SPA static files
    depends_on:
      - trader
      - admin-api

  grafana:
    env_file:
      - ../.env   # 注入 GF_SERVER_ROOT_URL=https://$DOMAIN/grafana/

  # Dashboard 静态文件由 caddy 直接 serve, 不单独起容器
  # 如需要单独前端容器, 在此追加 dashboard service
