version: "2"

# sqlc generates type-safe Go from raw SQL. Run via `make sqlc`. CI runs
# `make sqlc-check` to assert the generated code is in sync with the source.
#
# Layout: schema files under ./migrations (read by sqlc only for column types),
# queries under ./queries (one .sql per table), generated code under ./gen.
sql:
  - schema:  ./migrations
    queries: ./queries
    engine:  postgresql
    gen:
      go:
        package:     gen
        out:         ./gen
        sql_package: pgx/v5
        # Map all NUMERIC columns to shopspring/decimal.Decimal — money-safety
        # path (CLAUDE.md §19). Default sqlc maps numeric → pgtype.Numeric
        # which is awkward for arithmetic; decimal.Decimal is the project's
        # canonical money type.
        overrides:
          - db_type: pg_catalog.numeric
            go_type:
              import: github.com/shopspring/decimal
              package: decimal
              type:    Decimal
          - db_type: timestamptz
            go_type: time.Time
